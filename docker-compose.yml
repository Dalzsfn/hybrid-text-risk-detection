version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: hybrid_text_risk_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    container_name: hybrid_text_risk_api
    depends_on:
      - postgres
    environment:
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME}
    ports:
      - "8000:8000"

  frontend:
    build: ./frontend
    container_name: hybrid_text_risk_frontend
    depends_on:
      - backend
    environment:
      REACT_APP_API_URL: http://backend:8000
    ports:
      - "3000:3000"

volumes:
  postgres_data: